<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة السنتر التعليمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4cc9f0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warn: #f1c40f;
            --dark: #2b2d42;
            --light: #f8f9fa;
            --gray: #8d99ae;
            --border: #edf2f4;
            --card-bg: #ffffff;
            --text: #2b2d42;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--light); color: var(--text); overflow-x: hidden; }

        /* Login Screen */
        #loginScreen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, var(--primary), var(--accent)); }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { margin-bottom: 20px; color: var(--dark); font-weight: 800; }
        .login-box i { font-size: 50px; color: var(--primary); margin-bottom: 15px; }
        
        /* Layout */
        #appContainer { display: none; min-height: 100vh; flex-direction: column; }
        .navbar { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        
        .main-wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: var(--card-bg); border-left: 1px solid var(--border); padding: 20px 0; overflow-y: auto; transition: 0.3s; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 12px; padding: 15px 25px; color: var(--gray); text-decoration: none; font-weight: 600; transition: 0.2s; cursor: pointer; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background: var(--light); color: var(--primary); border-right: 4px solid var(--primary); }
        .sidebar-menu li a i { width: 20px; text-align: center; }
        
        .content-area { flex: 1; padding: 30px; overflow-y: auto; background: var(--light); }
        section { display: none; animation: fadeIn 0.4s ease-in-out; }
        section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms & Inputs */
        .form-group { margin-bottom: 15px; text-align: right; flex: 1; min-width: 200px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); }
        .form-input { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1); }
        
        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--secondary); }
        .btn-accent { background: var(--success); color: white; }
        .btn-accent:hover { background: #27ae60; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--dark); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-block { width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; }

        /* Cards & Tables */
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .card-title { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .card-icon { background: var(--light); width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: var(--primary); }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); display: flex; align-items: center; gap: 15px; border-right: 4px solid var(--primary); }
        .stat-icon { font-size: 2.5rem; color: var(--primary); opacity: 0.8; }
        .stat-info h3 { font-size: 0.9rem; color: var(--gray); margin-bottom: 5px; }
        .stat-info p { font-size: 1.5rem; font-weight: 800; color: var(--dark); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); }
        th { font-weight: 700; color: var(--gray); background: var(--light); white-space: nowrap; }
        tbody tr:hover { background-color: rgba(67, 97, 238, 0.02); }
        
        /* Utilities */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-success { background: rgba(46, 204, 113, 0.1); color: var(--success); }
        .badge-warn { background: rgba(241, 196, 15, 0.1); color: #d4ac0d; }
        .badge-danger { background: rgba(231, 76, 60, 0.1); color: var(--danger); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
        .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; }

        /* Toasts */
        #toastContainer { position: fixed; bottom: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 8px; color: white; font-weight: 600; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 10px; }
            .sidebar-menu { display: flex; }
            .sidebar-menu li a { padding: 10px 15px; border-right: none; border-bottom: 3px solid transparent; white-space: nowrap; }
            .sidebar-menu li a.active { border-bottom: 3px solid var(--primary); background: transparent; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Toast Notifications -->
    <div id="toastContainer"></div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-box">
            <i class="fas fa-graduation-cap"></i>
            <h2>نظام السنتر التعليمي</h2>
            <div class="form-group">
                <select id="loginRole" class="form-input" onchange="toggleLoginFields()">
                    <option value="student">تسجيل دخول طالب</option>
                    <option value="admin">تسجيل دخول إدارة</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="loginUser" class="form-input" placeholder="رقم الطالب / اسم المستخدم">
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" class="form-input" placeholder="رمز الدخول (أول 4 أرقام من ولي الأمر)">
            </div>
            <button class="btn btn-primary btn-block" onclick="login()">دخول <i class="fas fa-sign-in-alt"></i></button>
        </div>
    </div>

    <!-- Main Application -->
    <div id="appContainer">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <i class="fas fa-book-reader"></i> السنتر التعليمي
            </div>
            <div class="user-info">
                <span id="userNameDisplay">اسم المستخدم</span>
                <button class="btn btn-outline btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </nav>

        <div class="main-wrapper">
            <!-- Sidebar -->
            <aside class="sidebar">
                <ul class="sidebar-menu" id="navMenu">
                    <!-- Menu items injected via JS -->
                </ul>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                
                <!-- ADMIN SECTIONS -->
                <section id="sec_dashboard">
                    <div class="dashboard-grid" id="adminStatsGrid"></div>
                </section>
                
                <section id="sec_adminStudents">
                    <!-- Students list & add form -->
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-users"></i> قائمة الطلاب</div></div>
                        <div class="table-wrapper" id="studentsTableContainer"></div>
                    </div>
                </section>
                
                <section id="sec_adminPayments"></section>
                <section id="sec_adminGrades"></section>
                <section id="sec_adminSchedules"></section>
                <section id="sec_adminExcuses"></section>

                <!-- STUDENT SECTIONS -->
                <section id="sec_studentDashboard">
                    <div class="card"><div class="card-header"><div class="card-title">مرحباً بك في لوحتك</div></div><p>يمكنك تصفح القوائم الجانبية لمتابعة درجاتك ومواعيدك.</p></div>
                </section>
                <section id="sec_studentProfile"><div id="profileContainer"></div></section>
                <section id="sec_studentGrades"><div id="studentGradesContainer"></div></section>
                <section id="sec_studentPayments"><div id="studentPaymentsContainer"></div></section>
                <section id="sec_studentSchedules"><div id="studentSchedulesContainer"></div></section>
                <section id="sec_studentExcuses">
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-plus"></i> تقديم اعتذار جديد</div></div>
                        <div class="form-group"><label>سبب الاعتذار</label><textarea id="excuseReason" class="form-input" rows="3" placeholder="اكتب سبب الغياب هنا..."></textarea></div>
                        <button class="btn btn-primary" onclick="addStudentExcuse()"><i class="fas fa-paper-plane"></i> إرسال</button>
                    </div>
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-history"></i> سجل الاعتذارات</div></div>
                        <div class="table-wrapper" id="studentExcusesContainer"></div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <script>
        // --- Core Configuration & State ---
        let currentUser = null;
        const GROUPS = ['المجموعة الأولى', 'المجموعة الثانية', 'المجموعة الثالثة'];
        const API_URL = '/api';

        const TRANSLATIONS = {
            addPayment: 'إضافة دفعة جديدة', studentName: 'اسم الطالب', group: 'المجموعة', 
            month: 'الشهر', subscription: 'الاشتراك', paid: 'المدفوع', notes: 'ملاحظات', 
            save: 'حفظ', payments: 'المدفوعات', name: 'الاسم', remaining: 'المتبقي', 
            complete: 'مكتمل', incomplete: 'غير مكتمل', noData: 'لا توجد بيانات متاحة',
            addSchedule: 'إضافة موعد جديد', day: 'اليوم', time: 'الوقت', teacher: 'المعلم', 
            add: 'إضافة', schedules: 'جدول المواعيد', subject: 'المادة', status: 'الحالة', 
            active: 'نشط', inactive: 'غير نشط', noSchedules: 'لا توجد مواعيد',
            confirmDelete: 'هل أنت متأكد من الحذف؟', delete: 'تم الحذف', excuses: 'الاعتذارات',
            reason: 'السبب', pending: 'قيد المراجعة', approved: 'مقبول', rejected: 'مرفوض',
            dashboard: 'الرئيسية', students: 'الطلاب', grades: 'الدرجات'
        };

        const t = (key) => TRANSLATIONS[key] || key;
        const safeVal = (v) => v || '';
        const buildOptions = (arr) => arr.map(a => `<option value="${a}">${a}</option>`).join('');
        const badge = (txt, cls) => `<span class="badge ${cls}">${txt}</span>`;
        const emptyState = (icon, txt) => `<div class="empty-state"><i class="fas ${icon}"></i><p>${txt}</p></div>`;
        const getVal = (id) => document.getElementById(id).value.trim();
        const getCurrentMonth = () => new Intl.DateTimeFormat('ar-EG', { month: 'long' }).format(new Date());
        const getCurrentYear = () => new Date().getFullYear();

        // --- Utils ---
        async function api(endpoint, data = null) {
            try {
                const options = { method: data ? 'POST' : 'GET', headers: {} };
                if (data) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                }
                const res = await fetch(`${API_URL}/${endpoint}`, options);
                const json = await res.json();
                if(!json.success) throw new Error(json.message || 'Error');
                return json.data || json;
            } catch (err) {
                showToast(err.message, 'error');
                return null;
            }
        }

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.backgroundColor = type === 'success' ? 'var(--success)' : (type === 'error' ? 'var(--danger)' : 'var(--warn)');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            c.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function promptDialog(msg, defaultVal) { return prompt(msg, defaultVal); }
        function confirmDialog(msg) { return confirm(msg); }

        function showSection(secId, el) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(secId).classList.add('active');
            if(el) {
                document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
                el.classList.add('active');
            }
            // Load data based on section
            if(currentUser.role === 'admin') {
                if(secId === 'sec_dashboard') loadAdminDashboard();
                if(secId === 'sec_adminStudents') loadAdminStudents();
                if(secId === 'sec_adminPayments') loadAdminPayments();
                if(secId === 'sec_adminSchedules') loadAdminSchedules();
                if(secId === 'sec_adminExcuses') loadAdminExcuses();
            } else {
                if(secId === 'sec_studentProfile') loadStudentProfile();
                if(secId === 'sec_studentGrades') loadStudentGrades();
                if(secId === 'sec_studentPayments') loadStudentPayments();
                if(secId === 'sec_studentSchedules') loadStudentSchedules();
                if(secId === 'sec_studentExcuses') loadStudentExcuses();
            }
        }

        // --- Auth ---
        function toggleLoginFields() {
            const isStudent = document.getElementById('loginRole').value === 'student';
            document.getElementById('loginPass').placeholder = isStudent ? 'رمز الدخول (أول 4 أرقام من ولي الأمر)' : 'كلمة المرور';
        }

        async function login() {
            const role = document.getElementById('loginRole').value;
            const user = getVal('loginUser');
            const pass = getVal('loginPass');
            if(!user || !pass) return showToast('يرجى إدخال البيانات', 'error');

            const res = await fetch(`${API_URL}/verifyLogin`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role, user, pass })
            }).then(r => r.json());

            if (res.success) {
                currentUser = res.data;
                initApp();
            } else {
                showToast(res.message, 'error');
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        function initApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = currentUser.name;
            
            const menu = document.getElementById('navMenu');
            menu.innerHTML = '';

            if (currentUser.role === 'admin') {
                menu.innerHTML = `
                    <li><a class="active" onclick="showSection('sec_dashboard', this)"><i class="fas fa-home"></i> ${t('dashboard')}</a></li>
                    <li><a onclick="showSection('sec_adminStudents', this)"><i class="fas fa-users"></i> ${t('students')}</a></li>
                    <li><a onclick="showSection('sec_adminPayments', this)"><i class="fas fa-money-bill-wave"></i> ${t('payments')}</a></li>
                    <li><a onclick="showSection('sec_adminSchedules', this)"><i class="fas fa-clock"></i> ${t('schedules')}</a></li>
                    <li><a onclick="showSection('sec_adminExcuses', this)"><i class="fas fa-envelope-open-text"></i> ${t('excuses')}</a></li>
                `;
                showSection('sec_dashboard', menu.querySelector('a'));
            } else {
                menu.innerHTML = `
                    <li><a class="active" onclick="showSection('sec_studentDashboard', this)"><i class="fas fa-home"></i> ${t('dashboard')}</a></li>
                    <li><a onclick="showSection('sec_studentProfile', this)"><i class="fas fa-id-card"></i> بياناتي</a></li>
                    <li><a onclick="showSection('sec_studentGrades', this)"><i class="fas fa-star"></i> درجاتي</a></li>
                    <li><a onclick="showSection('sec_studentPayments', this)"><i class="fas fa-wallet"></i> مدفوعاتي</a></li>
                    <li><a onclick="showSection('sec_studentSchedules', this)"><i class="fas fa-calendar-alt"></i> مواعيدي</a></li>
                    <li><a onclick="showSection('sec_studentExcuses', this)"><i class="fas fa-comment-dots"></i> الاعتذارات</a></li>
                `;
                showSection('sec_studentDashboard', menu.querySelector('a'));
            }
        }

        // --- Admin Functions ---
        async function loadAdminDashboard() {
            const data = await api('dashboard');
            if(data) {
                document.getElementById('adminStatsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>إجمالي الطلاب</h3><p>${data.totalStudents}</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-check"></i></div><div class="stat-info"><h3>الطلاب النشطين</h3><p>${data.activeStudents}</p></div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-info"><h3>إيرادات الشهر</h3><p>${data.totalPaid} ج.م</p></div></div>
                `;
            }
        }

        async function loadAdminStudents() {
            const list = await api('students');
            const tb = document.getElementById('studentsTableContainer');
            if(!list || !list.length) { tb.innerHTML = emptyState('fa-users', t('noData')); return; }
            let html = `<table><thead><tr><th>ID</th><th>الاسم</th><th>الصف</th><th>الهاتف</th><th>المجموعة</th><th>الحالة</th></tr></thead><tbody>`;
            html += list.map(s => `<tr><td>${s.id}</td><td><b>${s.name}</b></td><td>${s.grade}</td><td>${s.studentPhone}</td><td>${s.group}</td><td>${badge(s.status, s.status.includes('نشط') ? 'badge-success' : 'badge-danger')}</td></tr>`).join('');
            html += `</tbody></table>`;
            tb.innerHTML = html;
        }

        // Updated Admin Payments (from previous turn)
        async function loadAdminPayments() { 
            const list = await api('payments'); 
            let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-plus"></i></div>${t('addPayment')}</div></div>`; 
            html += '<div class="form-row">'; 
            html += `<div class="form-group"><label>${t('studentName')}</label><input class="form-input" id="payName"></div>`; 
            html += `<div class="form-group"><label>${t('group')}</label><select class="form-input" id="payGroup">${buildOptions(GROUPS)}</select></div>`; 
            html += `<div class="form-group"><label>${t('month')}</label><input class="form-input" id="payMonth" value="${getCurrentMonth()} ${getCurrentYear()}"></div>`; 
            html += '</div><div class="form-row">'; 
            html += `<div class="form-group"><label>${t('subscription')}</label><input class="form-input" type="number" id="paySub" value="500"></div>`; 
            html += `<div class="form-group"><label>${t('paid')}</label><input class="form-input" type="number" id="payAmount"></div>`; 
            html += `<div class="form-group"><label>${t('notes')}</label><input class="form-input" id="payNotes"></div>`; 
            html += '</div>'; 
            html += `<button class="btn btn-accent" onclick="addPayment()"><i class="fas fa-save"></i> ${t('save')}</button></div>`;

            html += `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-money-bill-wave"></i></div>${t('payments')}</div></div>`; 
            html += '<div class="table-wrapper"><table><thead><tr>'; 
            html += `<th>${t('name')}</th><th>${t('group')}</th><th>${t('month')}</th><th>${t('subscription')}</th><th>${t('paid')}</th><th>${t('remaining')}</th><th>الحالة</th></tr></thead><tbody id="paymentsTableBody"></tbody></table></div></div>`; 
            document.getElementById('sec_adminPayments').innerHTML = html; 
            
            const tb = document.getElementById('paymentsTableBody'); 
            if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="7">${emptyState('fa-money-bill-wave', t('noData'))}</td></tr>`; return; } 
            tb.innerHTML = list.map(p => { 
                const statusBadge = p.status && p.status.includes('مكتمل') ? badge(t('complete'), 'badge-success') : badge(t('incomplete'), 'badge-warn'); 
                return `<tr><td><b>${safeVal(p.name)}</b></td><td>${safeVal(p.group)}</td><td>${safeVal(p.monthYear)}</td><td>${safeVal(p.subscription)}</td><td style="color:var(--accent);font-weight:bold">${safeVal(p.paid)}</td><td style="color:var(--danger)">${safeVal(p.remaining)}</td><td>${statusBadge}</td></tr>`; 
            }).join(''); 
        }

        async function addPayment() {
            const name = getVal('payName');
            if (!name) return showToast(t('studentName') + '!', 'error');
            await api('payments/add', { name, group: getVal('payGroup'), monthYear: getVal('payMonth'), subscription: getVal('paySub'), paid: getVal('payAmount'), notes: getVal('payNotes') });
            showToast(t('save'), 'success');
            loadAdminPayments();
        }

        // Updated Admin Schedules (from previous turn)
        async function loadAdminSchedules() { 
            const list = await api('schedules'); 
            let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-plus"></i></div>${t('addSchedule')}</div></div>`;
            html += '<div class="form-row">';
            html += `<div class="form-group"><label>${t('day')}</label><select class="form-input" id="schDay">${buildOptions(['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'])}</select></div>`;
            html += `<div class="form-group"><label>${t('time')}</label><input class="form-input" id="schTime" placeholder="16:00 - 17:30"></div>`;
            html += `<div class="form-group"><label>${t('group')}</label><select class="form-input" id="schGroup">${buildOptions(GROUPS)}</select></div>`;
            html += `<div class="form-group"><label>${t('teacher')}</label><input class="form-input" id="schTeacher" value="أ/ محمد"></div>`;
            html += `<button class="btn btn-accent" style="margin-top:22px" onclick="addSchedule()"><i class="fas fa-save"></i> ${t('add')}</button>`;
            html += '</div></div>';

            html += `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-clock"></i></div>${t('schedules')}</div></div>`; 
            html += '<div class="table-wrapper"><table><thead><tr>'; 
            html += `<th>${t('day')}</th><th>${t('time')}</th><th>${t('group')}</th><th>${t('subject')}</th><th>${t('teacher')}</th><th>${t('status')}</th><th>إجراء</th></tr></thead><tbody id="schedulesTableBody"></tbody></table></div></div>`; 
            document.getElementById('sec_adminSchedules').innerHTML = html; 
            
            const tb = document.getElementById('schedulesTableBody'); 
            if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="7">${emptyState('fa-clock', t('noSchedules'))}</td></tr>`; return; } 
            tb.innerHTML = list.map(s => { 
                const statusBadge = s.status === 'نشط' ? badge(t('active'), 'badge-success') : badge(t('inactive'), 'badge-danger'); 
                return `<tr><td>${safeVal(s.day)}</td><td>${safeVal(s.time)}</td><td>${safeVal(s.group)}</td><td>${safeVal(s.subject)}</td><td>${safeVal(s.teacher)}</td><td>${statusBadge}</td><td><button class="btn btn-sm btn-danger" onclick="deleteSchedule(${s.id})"><i class="fas fa-trash"></i></button></td></tr>`; 
            }).join(''); 
        }

        async function addSchedule() {
            await api('schedules/add', { day: getVal('schDay'), time: getVal('schTime'), group: getVal('schGroup'), subject: 'مادة', teacher: getVal('schTeacher') });
            showToast(t('save'), 'success');
            loadAdminSchedules();
        }
        
        async function deleteSchedule(id) {
            if (confirmDialog(t('confirmDelete'))) {
                await api('schedules/delete', { id });
                showToast(t('delete'), 'success');
                loadAdminSchedules();
            }
        }

        // Updated Admin Excuses (from previous turn)
        async function loadAdminExcuses() { 
            const list = await api('excuses'); 
            let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-envelope-open-text"></i></div>${t('excuses')}</div></div>`; 
            html += '<div class="table-wrapper"><table><thead><tr>'; 
            html += `<th>ID</th><th>${t('name')}</th><th>التاريخ</th><th>${t('reason')}</th><th>${t('status')}</th><th>الرد</th><th>إجراء</th></tr></thead><tbody id="excusesTableBody"></tbody></table></div></div>`; 
            document.getElementById('sec_adminExcuses').innerHTML = html; 
            
            const tb = document.getElementById('excusesTableBody'); 
            if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="7">${emptyState('fa-envelope-open-text', t('noData'))}</td></tr>`; return; } 
            tb.innerHTML = list.map(e => { 
                let statusBadge; 
                if (e.status && e.status.includes('قيد')) statusBadge = badge(t('pending'), 'badge-warn'); 
                else if (e.status && e.status.includes('مقبول')) statusBadge = badge(t('approved'), 'badge-success'); 
                else statusBadge = badge(t('rejected'), 'badge-danger'); 
                return `<tr><td>${safeVal(e.id)}</td><td><b>${safeVal(e.studentName)}</b></td><td>${safeVal(e.date)}</td><td style="white-space:normal;max-width:200px">${safeVal(e.reason)}</td><td>${statusBadge}</td><td>${safeVal(e.reply)}</td><td>
                <div class="btn-group" style="display:flex;gap:5px">
                    <button class="btn btn-sm btn-outline" style="color:var(--success);border-color:var(--success)" onclick="replyExcuse(${e.id}, '✅ مقبول')"><i class="fas fa-check"></i></button>
                    <button class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger)" onclick="replyExcuse(${e.id}, '❌ مرفوض')"><i class="fas fa-times"></i></button>
                </div>
                </td></tr>`; 
            }).join(''); 
        }

        async function replyExcuse(id, status) {
            const reply = promptDialog('اكتب رد الإدارة للطالب:', '');
            if (reply !== null) {
                await api('excuses/update', { id, status, reply });
                showToast('تم التحديث', 'success');
                loadAdminExcuses();
            }
        }

        // --- Student Functions ---
        async function loadStudentProfile() {
            const data = await api(`student/profile?id=${currentUser.studentId}`);
            const div = document.getElementById('profileContainer');
            if(data) {
                div.innerHTML = `<div class="card"><div class="card-header"><div class="card-title">بياناتي الأساسية</div></div>
                <p><b>الاسم:</b> ${data.name}</p><p><b>الصف:</b> ${data.grade}</p><p><b>المجموعة:</b> ${data.group}</p>
                </div>`;
            }
        }

        async function loadStudentGrades() {
            const list = await api(`student/grades?id=${currentUser.studentId}`);
            const div = document.getElementById('studentGradesContainer');
            if(!list || !list.length) { div.innerHTML = emptyState('fa-star', t('noData')); return; }
            div.innerHTML = `<div class="card"><table><thead><tr><th>امتحان 1</th><th>امتحان 2</th><th>المتوسط</th><th>التقييم</th></tr></thead>
            <tbody><tr><td>${list[0].exam1||'-'}</td><td>${list[0].exam2||'-'}</td><td>${list[0].avg||'-'}</td><td>${badge(list[0].grade||'-', 'badge-primary')}</td></tr></tbody></table></div>`;
        }

        async function loadStudentPayments() {
            const list = await api(`student/payments?name=${currentUser.name}`);
            const div = document.getElementById('studentPaymentsContainer');
            if(!list || !list.length) { div.innerHTML = emptyState('fa-wallet', t('noData')); return; }
            let html = `<div class="card"><table><thead><tr><th>الشهر</th><th>الاشتراك</th><th>المدفوع</th><th>الحالة</th></tr></thead><tbody>`;
            html += list.map(p => `<tr><td>${p.monthYear}</td><td>${p.subscription}</td><td>${p.paid}</td><td>${badge(p.status, p.status.includes('مكتمل')?'badge-success':'badge-warn')}</td></tr>`).join('');
            html += `</tbody></table></div>`;
            div.innerHTML = html;
        }

        async function loadStudentSchedules() {
            const list = await api(`student/schedules`);
            const div = document.getElementById('studentSchedulesContainer');
            if(!list || !list.length) { div.innerHTML = emptyState('fa-calendar', t('noSchedules')); return; }
            let html = `<div class="card"><table><thead><tr><th>اليوم</th><th>الوقت</th><th>المجموعة</th><th>المادة</th></tr></thead><tbody>`;
            html += list.map(s => `<tr><td>${s.day}</td><td>${s.time}</td><td>${s.group}</td><td>${s.subject}</td></tr>`).join('');
            html += `</tbody></table></div>`;
            div.innerHTML = html;
        }

        async function loadStudentExcuses() {
            const list = await api(`student/excuses?id=${currentUser.studentId}`);
            const div = document.getElementById('studentExcusesContainer');
            if(!list || !list.length) { div.innerHTML = emptyState('fa-comment-dots', t('noData')); return; }
            let html = `<table><thead><tr><th>التاريخ</th><th>السبب</th><th>الحالة</th><th>رد الإدارة</th></tr></thead><tbody>`;
            html += list.map(e => `<tr><td>${e.date}</td><td>${e.reason}</td><td>${badge(e.status, e.status.includes('مقبول')?'badge-success':(e.status.includes('مرفوض')?'badge-danger':'badge-warn'))}</td><td>${e.reply||'-'}</td></tr>`).join('');
            html += `</tbody></table>`;
            div.innerHTML = html;
        }

        async function addStudentExcuse() {
            const reason = getVal('excuseReason');
            if(!reason) return showToast('يرجى كتابة السبب', 'error');
            await api('student/excuses/add', { studentId: currentUser.studentId, studentName: currentUser.name, reason });
            showToast('تم إرسال الاعتذار', 'success');
            document.getElementById('excuseReason').value = '';
            loadStudentExcuses();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة السنتر التعليمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9; --accent: #38bdf8; --success: #4ade80; --danger: #f87171; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .container { text-align: center; background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 90%; max-width: 400px; }
    h1 { color: var(--accent); margin-bottom: 20px; font-size: 24px; }
    p { color: #94a3b8; margin-bottom: 30px; }
    .btn { background: var(--accent); color: #000; padding: 12px 24px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 16px; width: 100%; }
    .login-form input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="container">
    <h1>نظام إدارة السنتر التعليمي</h1>
    <p>مرحباً بك، يتم تحميل النظام...</p>
    <div id="app">جاري التحقق من الاتصال...</div>
  </div>

  <script>
    // هذا الكود سيحاول الاتصال بالسيرفر فوراً
    fetch('/api/dashboard')
      .then(res => res.json())
      .then(data => {
        document.getElementById('app').innerHTML = 
          data.success 
          ? '<div style="color:var(--success)">تم الاتصال بنجاح! النظام يعمل.<br><br><button class="btn" onclick="location.reload()">دخول للوحة التحكم</button></div>' 
          : '<div style="color:var(--danger)">خطأ في الاتصال: ' + (data.message || 'Unknown') + '</div>';
      })
      .catch(err => {
        document.getElementById('app').innerHTML = '<div style="color:var(--danger)">فشل الاتصال بالخادم. تأكد من ملف server.js</div>';
      });
  </script>
</body>
</html>
